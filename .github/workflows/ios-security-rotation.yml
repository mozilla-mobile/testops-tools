name: Firefox iOS Security Monitor Rotation

on:
  schedule:
    - cron: '0 9 1-7 * 1'  # First Monday of every month at 9 AM UTC
  workflow_dispatch:

jobs:
  notify:
    name: Pick security monitor and notify Slack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r slack-reminders/requirements.txt

      - name: Pick name from sheet
        run: python slack-reminders/firefox-ios-security-monitor.py
        env:
          GCLOUD_AUTH: ${{ secrets.GCLOUD_AUTH }}

      - name: Set month env var
        run: echo "month=$(date +'%B %Y')" >> $GITHUB_ENV

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.1.1
        with:
          payload-file-path: slack-reminders/ios-security-rotation.json
          payload-templated: true
          webhook: ${{ secrets.SLACK_WEBHOOK_URL_TEST_ALERTS_SANDBOX }}
          webhook-type: incoming-webhook

      # TODO: Let's set the channel topic later
      # - name: Set channel topic
      #   uses: slackapi/slack-github-action@v2.1.1
      #   with:
      #     method: conversations.setTopic
      #     token: ${{ secrets.SLACK_BOT_TOKEN }}
      #     payload: |
      #       channel: "${{ secrets.SLACK_CHANNEL_ID_MOBILE_ALERTS_SANDBOX }}"
      #       topic: "Security Monitor (${{ env.month }}): ${{ env.security_monitor_name }}"

      - name: Commit updated rotation state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slack-reminders/security_monitor_state.txt
          git commit -m "chore: update security monitor rotation state to $(cat slack-reminders/security_monitor_state.txt)"
          git push
