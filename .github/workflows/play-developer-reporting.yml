name: Play Developer Reporting

on:
  schedule: 
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build
        working-directory: play-developer-reporting
        run: docker build -t play-vitals .

      - name: Run
        env:
          GOOGLE_SA_VITALS_JSON: ${{ secrets.GOOGLE_SA_VITALS_JSON }}
        run: |
          mkdir -p /tmp/vitals-output
          docker run \
            -v /tmp/vitals-output:/tmp/vitals-output \
            -e GOOGLE_SA_VITALS_JSON="$GOOGLE_SA_VITALS_JSON" \
            play-vitals

      - name: Summary
        run: cat /tmp/vitals-output/summary.md >> $GITHUB_STEP_SUMMARY

      - name: Slack
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL_PRODUCT_HEALTH }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/vitals-output/slack_payload.json
